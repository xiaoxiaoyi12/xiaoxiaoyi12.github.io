<!DOCTYPE html>
<html lang="{{ site.lang | default: "zh-CN" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
    {% seo %}
  </head>

  <body>

    {% include theme-toggle.html %}

    <header class="site-header">
      <div class="container header-inner">
        <a class="site-brand" href="{{ '/' | relative_url }}">
          <span class="site-title">{{ site.title | default: site.github.repository_name }}</span>
          <span class="site-desc">{{ site.description | default: site.github.project_tagline }}</span>
        </a>
        <nav class="header-nav">
          <a class="header-nav-btn" href="{{ '/bookmark/' | relative_url }}">书签</a>
          <a class="header-nav-btn" href="{{ '/admin/' | relative_url }}">创作</a>
          <span class="header-nav-sep"></span>
          <button class="theme-toggle header-nav-btn" type="button" aria-label="切换主题"></button>
        </nav>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>
  </body>
</html>

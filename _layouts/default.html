<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
    {% seo %}
  </head>

  <body>

    <header>
      <div class="container">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <a id="a-title" href="{{ '/' | relative_url }}">
            <h1>{{ site.title | default: site.github.repository_name }}</h1>
          </a>
          <nav style="display:flex;align-items:center;gap:8px;">
            <a href="{{ '/bookmark/' | relative_url }}" style="text-decoration:none;color:inherit;font-size:14px;font-weight:600;padding:4px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;">bookmark</a>
            <a href="{{ '/admin/' | relative_url }}" style="text-decoration:none;color:inherit;font-size:14px;font-weight:600;padding:4px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;">创作</a>
          </nav>
        </div>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>
  </body>
</html>

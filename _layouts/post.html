---
layout: default
---

<style>
  .back-btn {
    display: inline-block;
    color: #58a6ff;
    font-size: 14px;
    text-decoration: none;
    margin-bottom: 20px;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .back-btn:hover {
    color: #79c0ff;
  }
  .back-btn::before {
    content: "← ";
  }
</style>

<a class="back-btn" href="{{ '/' | relative_url }}">返回首页</a>

<small>{{ page.date | date: "%Y-%m-%d" }}</small>
<h1>{{ page.title }}</h1>

{{content}}

{% if page.tags %}
  <small>tags: <em>{{ page.tags | join: "</em> - <em>" }}</em></small>
{% endif %}
